name: failframe

services:
  postgres:
    image: postgres:16-alpine
    container_name: failframe-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-failframe}
      POSTGRES_USER: ${POSTGRES_USER:-failframe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-failframe}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: failframe-redis
    profiles: ["placeholder"]
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]

  collector-service:
    build:
      context: ../collector-service
    container_name: failframe-collector-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-failframe}
      DATABASE_USERNAME: ${POSTGRES_USER:-failframe}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-failframe}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-validate}
      FAILFRAME_SECURITY_USERNAME: ${FAILFRAME_SECURITY_USERNAME:-failframe}
      FAILFRAME_SECURITY_PASSWORD: ${FAILFRAME_SECURITY_PASSWORD:-failframe}
      FAILFRAME_CORS_ALLOWED_ORIGINS: ${FAILFRAME_CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      FAILFRAME_MAX_REQUEST_BYTES: ${FAILFRAME_MAX_REQUEST_BYTES:-131072}
      MAX_HTTP_REQUEST_HEADER_SIZE: ${MAX_HTTP_REQUEST_HEADER_SIZE:-16KB}
      MAX_SWALLOW_SIZE: ${MAX_SWALLOW_SIZE:-256KB}
      MAX_REQUEST_SIZE: ${MAX_REQUEST_SIZE:-128KB}
      FAILFRAME_AI_PROVIDER: ${FAILFRAME_AI_PROVIDER:-mock}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
    ports:
      - "${COLLECTOR_PORT:-8080}:8080"

  demo-victim-app:
    build:
      context: ..
      dockerfile: demo-victim-app/Dockerfile
    container_name: failframe-demo-victim-app
    depends_on:
      - collector-service
    environment:
      SERVER_PORT: 8081
      FAILFRAME_ENABLED: "true"
      FAILFRAME_API_KEY: ${FAILFRAME_LOCAL_API_KEY:-failframe-local-dev-key}
      FAILFRAME_COLLECTOR_URL: http://collector-service:8080
      FAILFRAME_SERVICE_NAME: ${DEMO_FAILFRAME_SERVICE_NAME:-demo-victim-app}
      FAILFRAME_ENVIRONMENT: ${DEMO_FAILFRAME_ENVIRONMENT:-local}
    ports:
      - "${DEMO_VICTIM_APP_PORT:-8081}:8081"

  web-dashboard:
    build:
      context: ../web-dashboard
    container_name: failframe-web-dashboard
    profiles: ["dashboard"]
    depends_on:
      - collector-service
    ports:
      - "${DASHBOARD_PORT:-5173}:80"

volumes:
  postgres-data:
