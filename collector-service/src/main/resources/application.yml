server:
  port: ${SERVER_PORT:8080}
  max-http-request-header-size: ${MAX_HTTP_REQUEST_HEADER_SIZE:16KB}
  tomcat:
    max-swallow-size: ${MAX_SWALLOW_SIZE:256KB}

spring:
  application:
    name: collector-service
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/debugflow}
    username: ${DATABASE_USERNAME:debugflow}
    password: ${DATABASE_PASSWORD:debugflow}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: ${MAX_REQUEST_SIZE:128KB}
      max-request-size: ${MAX_REQUEST_SIZE:128KB}

debugflow:
  ai:
    provider: ${DEBUGFLOW_AI_PROVIDER:mock}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    model: ${OPENAI_MODEL:gpt-4o-mini}
  security:
    username: ${DEBUGFLOW_SECURITY_USERNAME:debugflow}
    password: ${DEBUGFLOW_SECURITY_PASSWORD:debugflow}
    max-request-bytes: ${DEBUGFLOW_MAX_REQUEST_BYTES:131072}
  cors:
    allowed-origins: ${DEBUGFLOW_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
